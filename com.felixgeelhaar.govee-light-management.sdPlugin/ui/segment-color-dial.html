<!doctype html>
<html>
  <head lang="en-gb">
    <meta charset="utf-8" />
    <title>Govee Light Management | Segment Color Dial</title>
    <link rel="stylesheet" href="./css/main.css" />
    <script src="./js/sdpi-components.js"></script>
    <script src="./js/setup.js"></script>
    <script src="./js/range-value.js"></script>
  </head>
  <body>
    <div id="settings" class="hidden">
      <sdpi-item label="Device">
        <sdpi-select
          setting="selectedDeviceId"
          placeholder=""
          datasource="getDevices"
          show-refresh
          label-setting="selectedLightName"
        ></sdpi-select>
      </sdpi-item>

      <sdpi-item label="Segment">
        <sdpi-range
          setting="segmentIndex"
          default="1"
          min="1"
          max="15"
          step="1"
          showlabels
          data-suffix=""
          data-number-input
        >
          <span slot="min">1</span>
          <span slot="max">15</span>
        </sdpi-range>
      </sdpi-item>

      <sdpi-item label="Saturation">
        <sdpi-range
          setting="saturation"
          default="100"
          min="0"
          max="100"
          step="1"
          showlabels
          data-suffix="%"
          data-number-input
        >
          <span slot="min">Grey</span>
          <span slot="max">Vivid</span>
        </sdpi-range>
      </sdpi-item>

      <sdpi-item label="Step Size">
        <sdpi-range
          setting="stepSize"
          default="15"
          min="1"
          max="90"
          step="1"
          showlabels
          data-suffix="°"
          data-number-input
        >
          <span slot="min">Fine</span>
          <span slot="max">Coarse</span>
        </sdpi-range>
      </sdpi-item>
    </div>

    <div id="setup" class="hidden">
      <sdpi-item label="API Key">
        <sdpi-password
          id="apiKey"
          global
          setting="unverifiedApiKey"
          placeholder="API key from Govee"
        ></sdpi-password>
      </sdpi-item>
      <sdpi-item>
        <sdpi-button id="connect">Connect</sdpi-button>
        <div id="errorMessage" class="hidden">
          Failed to connect, please try again.
        </div>
      </sdpi-item>
      <sdpi-item label="Guide" class="guide">
        <ol>
          <li>Open the Govee app</li>
          <li>Go to settings</li>
          <li>Select "Apply for API Key"</li>
        </ol>
      </sdpi-item>
    </div>
  </body>
</html>
