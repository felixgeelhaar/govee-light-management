<!doctype html>
<html>
  <head lang="en-gb">
    <meta charset="utf-8" />
    <title>Govee Light Management | Feature Toggle</title>
    <link rel="stylesheet" href="./css/main.css" />
    <script src="./js/sdpi-components.js"></script>
    <script src="./js/setup.js"></script>
  </head>
  <body>
    <div id="settings" class="hidden">
      <sdpi-item label="Device">
        <sdpi-select
          id="deviceSelect"
          setting="selectedDeviceId"
          placeholder=""
          datasource="getDevices"
          show-refresh
          label-setting="selectedLightName"
        ></sdpi-select>
      </sdpi-item>

      <sdpi-item label="Feature">
        <sdpi-select
          id="featureSelect"
          setting="selectedFeature"
          datasource="getToggleFeatures"
          show-refresh
          placeholder="Select a device first"
        ></sdpi-select>
      </sdpi-item>

      <sdpi-item label="Action">
        <sdpi-select setting="operation" default="toggle">
          <option value="toggle">Toggle On/Off</option>
          <option value="on">Turn On</option>
          <option value="off">Turn Off</option>
        </sdpi-select>
      </sdpi-item>
    </div>

    <div id="setup" class="hidden">
      <sdpi-item label="API Key">
        <sdpi-password
          id="apiKey"
          global
          setting="unverifiedApiKey"
          placeholder="API key from Govee"
        ></sdpi-password>
      </sdpi-item>
      <sdpi-item>
        <sdpi-button id="connect">Connect</sdpi-button>
        <div id="errorMessage" class="hidden">
          Failed to connect, please try again.
        </div>
      </sdpi-item>
      <sdpi-item label="Guide" class="guide">
        <ol>
          <li>Open the Govee app</li>
          <li>Go to settings</li>
          <li>Select "Apply for API Key"</li>
        </ol>
      </sdpi-item>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const deviceSelect = document.getElementById("deviceSelect");
        const featureSelect = document.getElementById("featureSelect");

        window.GoveePI.attachFieldStatus(featureSelect, "getToggleFeatures", {
          emptyMsg: "This device has no toggleable features.",
          errorMsg:
            "Couldn't load toggleable features. Check your connection and try again.",
        });

        // When device changes, refresh the feature list
        deviceSelect.addEventListener("valuechange", () => {
          if (featureSelect && featureSelect.refresh) {
            featureSelect.refresh();
          }
        });
      });
    </script>
  </body>
</html>
