<!doctype html>
<html>
  <head lang="en-gb">
    <meta charset="utf-8" />
    <title>Govee Light Management | Schedule</title>
    <link rel="stylesheet" href="./css/main.css" />
    <script src="./js/sdpi-components.js"></script>
    <script src="./js/setup.js"></script>
    <style>
      .schedule-section {
        display: block;
        margin-top: 4px;
      }
      .schedule-section.hidden {
        display: none;
      }
      .time-row {
        display: flex;
        gap: 4px;
        align-items: center;
      }
      .time-row input[type="number"] {
        width: 60px;
      }
      .day-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 4px;
      }
      .day-chip {
        padding: 4px 6px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 3px;
        text-align: center;
        cursor: pointer;
        font-size: 11px;
        user-select: none;
      }
      .day-chip.active {
        background: #4fa3ff;
        color: white;
        border-color: #4fa3ff;
      }
      .help-text {
        font-size: 11px;
        color: #888;
        margin-top: 4px;
      }
      sdpi-item {
        --sdpi-label-width: 90px;
      }
    </style>
  </head>
  <body>
    <div id="settings" class="hidden">
      <sdpi-item label="Name">
        <sdpi-textfield
          setting="scheduleName"
          placeholder="e.g. Evening lights"
          maxlength="40"
        ></sdpi-textfield>
      </sdpi-item>

      <sdpi-item label="Device">
        <sdpi-select
          setting="selectedDeviceId"
          datasource="getDevices"
          show-refresh
          label-setting="selectedLightName"
        ></sdpi-select>
      </sdpi-item>

      <sdpi-item label="Schedule">
        <sdpi-select setting="scheduleType">
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
          <option value="delay">After Delay</option>
        </sdpi-select>
      </sdpi-item>

      <div id="timeSection" class="schedule-section">
        <sdpi-item label="Time (UTC)">
          <div class="time-row">
            <input
              id="hourInput"
              type="number"
              min="0"
              max="23"
              placeholder="HH"
            />
            <span>:</span>
            <input
              id="minuteInput"
              type="number"
              min="0"
              max="59"
              placeholder="MM"
            />
          </div>
        </sdpi-item>
      </div>

      <div id="daysSection" class="schedule-section hidden">
        <sdpi-item label="Days">
          <div class="day-grid" id="dayGrid">
            <div class="day-chip" data-day="0">Sun</div>
            <div class="day-chip" data-day="1">Mon</div>
            <div class="day-chip" data-day="2">Tue</div>
            <div class="day-chip" data-day="3">Wed</div>
            <div class="day-chip" data-day="4">Thu</div>
            <div class="day-chip" data-day="5">Fri</div>
            <div class="day-chip" data-day="6">Sat</div>
          </div>
        </sdpi-item>
      </div>

      <div id="delaySection" class="schedule-section hidden">
        <sdpi-item label="Delay (s)">
          <input
            id="delayInput"
            type="number"
            min="1"
            max="86400"
            placeholder="e.g. 300"
          />
        </sdpi-item>
        <div class="help-text">Runs once N seconds after button press</div>
      </div>

      <sdpi-item label="Action">
        <sdpi-select setting="command">
          <option value="on">Turn On</option>
          <option value="off">Turn Off</option>
          <option value="toggle">Toggle</option>
          <option value="brightness">Set Brightness</option>
        </sdpi-select>
      </sdpi-item>

      <sdpi-item label="Brightness" id="brightnessItem" class="hidden">
        <sdpi-range
          setting="commandValue"
          min="0"
          max="100"
          step="5"
          data-suffix="%"
          data-number-input
        ></sdpi-range>
      </sdpi-item>

      <div class="help-text">Press button to enable/disable this schedule</div>
    </div>

    <div id="setup" class="hidden">
      <sdpi-item label="API Key">
        <sdpi-password
          id="apiKey"
          global
          setting="unverifiedApiKey"
          placeholder="API key from Govee"
        ></sdpi-password>
      </sdpi-item>
      <sdpi-item>
        <sdpi-button id="connect">Connect</sdpi-button>
        <div id="errorMessage" class="hidden">
          Failed to connect, please try again.
        </div>
      </sdpi-item>
    </div>

    <script>
      (function () {
        const timeSection = document.getElementById("timeSection");
        const daysSection = document.getElementById("daysSection");
        const delaySection = document.getElementById("delaySection");
        const brightnessItem = document.getElementById("brightnessItem");
        const hourInput = document.getElementById("hourInput");
        const minuteInput = document.getElementById("minuteInput");
        const delayInput = document.getElementById("delayInput");
        const dayGrid = document.getElementById("dayGrid");

        let currentSettings = {};
        let client = null;

        function ensureId(settings) {
          if (!settings.scheduleId) {
            settings.scheduleId = `schedule-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
          }
          return settings;
        }

        function updateVisibility(type) {
          timeSection.classList.toggle(
            "hidden",
            type !== "daily" && type !== "weekly",
          );
          daysSection.classList.toggle("hidden", type !== "weekly");
          delaySection.classList.toggle("hidden", type !== "delay");
        }

        function updateBrightnessVisibility(command) {
          brightnessItem.classList.toggle("hidden", command !== "brightness");
        }

        function renderDays(days) {
          const active = new Set(days || []);
          dayGrid.querySelectorAll(".day-chip").forEach((chip) => {
            const day = parseInt(chip.dataset.day, 10);
            chip.classList.toggle("active", active.has(day));
          });
        }

        function toggleDay(day) {
          const days = new Set(currentSettings.days || []);
          if (days.has(day)) days.delete(day);
          else days.add(day);
          currentSettings.days = Array.from(days).sort();
          renderDays(currentSettings.days);
          saveSettings();
        }

        function saveSettings() {
          if (!client) return;
          client.setSettings(ensureId({ ...currentSettings }));
        }

        function onSettingsReceived(settings) {
          currentSettings = ensureId({ ...settings });
          updateVisibility(settings.scheduleType || "daily");
          updateBrightnessVisibility(settings.command);
          hourInput.value = settings.hour ?? "";
          minuteInput.value = settings.minute ?? "";
          delayInput.value = settings.delaySeconds ?? "";
          renderDays(settings.days);
        }

        function bind() {
          client = window.SDPIComponents?.streamDeckClient;
          if (!client) {
            setTimeout(bind, 100);
            return;
          }

          client.on?.("didReceiveSettings", (msg) => {
            onSettingsReceived(msg?.payload?.settings || {});
          });

          dayGrid.addEventListener("click", (e) => {
            const chip = e.target.closest(".day-chip");
            if (chip) toggleDay(parseInt(chip.dataset.day, 10));
          });

          [hourInput, minuteInput].forEach((input) => {
            input.addEventListener("change", () => {
              currentSettings.hour = parseInt(hourInput.value, 10);
              currentSettings.minute = parseInt(minuteInput.value, 10);
              saveSettings();
            });
          });

          delayInput.addEventListener("change", () => {
            currentSettings.delaySeconds = parseInt(delayInput.value, 10);
            saveSettings();
          });

          // React to schedule type / command changes via global settings observer
          document.addEventListener("change", (e) => {
            const target = e.target;
            if (!target) return;
            const setting = target.getAttribute?.("setting");
            if (setting === "scheduleType") {
              setTimeout(() => {
                const newType = target.value;
                updateVisibility(newType);
              }, 50);
            }
            if (setting === "command") {
              setTimeout(() => {
                updateBrightnessVisibility(target.value);
              }, 50);
            }
          });
        }

        document.addEventListener("DOMContentLoaded", bind);
        if (document.readyState !== "loading") bind();
      })();
    </script>
  </body>
</html>
