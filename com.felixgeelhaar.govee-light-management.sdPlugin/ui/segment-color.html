<!doctype html>
<html>
  <head lang="en-gb">
    <meta charset="utf-8" />
    <title>Govee Light Management | Segment Color</title>
    <link rel="stylesheet" href="./css/main.css" />
    <script>
      (function () {
        const original = window.connectElgatoStreamDeckSocket;
        window.connectElgatoStreamDeckSocket = function (
          port,
          uuid,
          event,
          info,
          actionInfo,
        ) {
          try {
            const ai =
              typeof actionInfo === "string" ? JSON.parse(actionInfo) : actionInfo;
            const controller =
              ai?.payload?.controller ||
              ai?.controller ||
              ai?.action?.controller ||
              "Keypad";
            const set = function () {
              document.body.dataset.controller = String(controller).toLowerCase();
            };
            if (document.body) set();
            else document.addEventListener("DOMContentLoaded", set);
          } catch {
            // Default to keypad rendering on any parse error.
          }
          return original
            ? original.call(this, port, uuid, event, info, actionInfo)
            : undefined;
        };
      })();
    </script>
    <script src="./js/sdpi-components.js"></script>
    <script src="./js/setup.js"></script>
    <script src="./js/range-value.js"></script>
    <style>
      body[data-controller="encoder"] [data-controller-only="keypad"] {
        display: none;
      }
      body[data-controller="keypad"] [data-controller-only="encoder"] {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="settings" class="hidden">
      <sdpi-item label="Device">
        <sdpi-select
          setting="selectedDeviceId"
          placeholder=""
          datasource="getDevices"
          show-refresh
          label-setting="selectedLightName"
        ></sdpi-select>
      </sdpi-item>

      <div data-controller-only="keypad">
      <sdpi-item label="Preset">
        <sdpi-select id="presetSelect" setting="preset" default="rainbow">
          <option value="rainbow">Rainbow</option>
          <option value="solid">Solid Color</option>
          <option value="gradient">Hue Gradient</option>
        </sdpi-select>
      </sdpi-item>

      <sdpi-item label="From Segment">
        <sdpi-range
          setting="segmentStart"
          default="1"
          min="1"
          max="15"
          step="1"
          showlabels
          data-suffix=""
          data-number-input
        >
          <span slot="min">1</span>
          <span slot="max">15</span>
        </sdpi-range>
      </sdpi-item>

      <sdpi-item label="To Segment">
        <sdpi-range
          setting="segmentEnd"
          default="15"
          min="1"
          max="15"
          step="1"
          showlabels
          data-suffix=""
          data-number-input
        >
          <span slot="min">1</span>
          <span slot="max">15</span>
        </sdpi-range>
      </sdpi-item>

      <sdpi-item id="solidItem" label="Hue" style="display: none">
        <sdpi-range
          setting="hue"
          default="0"
          min="0"
          max="359"
          step="1"
          showlabels
          data-suffix="°"
          data-number-input
        >
          <span slot="min">0°</span>
          <span slot="max">359°</span>
        </sdpi-range>
      </sdpi-item>

      <sdpi-item id="gradStartItem" label="Start Hue" style="display: none">
        <sdpi-range
          setting="hueStart"
          default="0"
          min="0"
          max="359"
          step="1"
          showlabels
          data-suffix="°"
          data-number-input
        >
          <span slot="min">0°</span>
          <span slot="max">359°</span>
        </sdpi-range>
      </sdpi-item>

      <sdpi-item id="gradEndItem" label="End Hue" style="display: none">
        <sdpi-range
          setting="hueEnd"
          default="300"
          min="0"
          max="359"
          step="1"
          showlabels
          data-suffix="°"
          data-number-input
        >
          <span slot="min">0°</span>
          <span slot="max">359°</span>
        </sdpi-range>
      </sdpi-item>
      </div>

      <div data-controller-only="encoder">
        <sdpi-item label="Segment">
          <sdpi-range
            setting="segmentIndex"
            default="1"
            min="1"
            max="15"
            step="1"
            showlabels
            data-suffix=""
            data-number-input
          >
            <span slot="min">1</span>
            <span slot="max">15</span>
          </sdpi-range>
        </sdpi-item>

        <sdpi-item label="Saturation">
          <sdpi-range
            setting="saturation"
            default="100"
            min="0"
            max="100"
            step="1"
            showlabels
            data-suffix="%"
            data-number-input
          >
            <span slot="min">Grey</span>
            <span slot="max">Vivid</span>
          </sdpi-range>
        </sdpi-item>

        <sdpi-item label="Step Size">
          <sdpi-range
            setting="stepSize"
            default="15"
            min="1"
            max="90"
            step="1"
            showlabels
            data-suffix="°"
            data-number-input
          >
            <span slot="min">Fine</span>
            <span slot="max">Coarse</span>
          </sdpi-range>
        </sdpi-item>
      </div>
    </div>

    <div id="setup" class="hidden">
      <sdpi-item label="API Key">
        <sdpi-password
          id="apiKey"
          global
          setting="unverifiedApiKey"
          placeholder="API key from Govee"
        ></sdpi-password>
      </sdpi-item>
      <sdpi-item>
        <sdpi-button id="connect">Connect</sdpi-button>
        <div id="errorMessage" class="hidden">
          Failed to connect, please try again.
        </div>
      </sdpi-item>
      <sdpi-item label="Guide" class="guide">
        <ol>
          <li>Open the Govee app</li>
          <li>Go to settings</li>
          <li>Select "Apply for API Key"</li>
        </ol>
      </sdpi-item>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const solidItem = document.getElementById("solidItem");
        const gradStartItem = document.getElementById("gradStartItem");
        const gradEndItem = document.getElementById("gradEndItem");
        const presetSelect = document.getElementById("presetSelect");

        function updateVisibility(preset) {
          solidItem.style.display = preset === "solid" ? "" : "none";
          gradStartItem.style.display = preset === "gradient" ? "" : "none";
          gradEndItem.style.display = preset === "gradient" ? "" : "none";
        }

        // SDPI components dispatch "valuechange" on the web component
        presetSelect.addEventListener("valuechange", () => {
          updateVisibility(presetSelect.value || "rainbow");
        });

        // Also try standard events as fallback
        presetSelect.addEventListener("change", () => {
          updateVisibility(presetSelect.value || "rainbow");
        });

        // Poll to catch initial value from saved settings
        let attempts = 0;
        const poll = setInterval(() => {
          const val = presetSelect.value;
          if (val && val !== "") {
            updateVisibility(val);
            clearInterval(poll);
          }
          if (++attempts > 30) clearInterval(poll);
        }, 100);
      });
    </script>
  </body>
</html>
