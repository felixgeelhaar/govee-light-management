<!doctype html>
<html>
  <head lang="en-gb">
    <meta charset="utf-8" />
    <title>Govee Light Management | Saturation</title>
    <link rel="stylesheet" href="./css/main.css" />
    <script>
      (function () {
        const original = window.connectElgatoStreamDeckSocket;
        window.connectElgatoStreamDeckSocket = function (
          port,
          uuid,
          event,
          info,
          actionInfo,
        ) {
          try {
            const ai =
              typeof actionInfo === "string" ? JSON.parse(actionInfo) : actionInfo;
            const controller =
              ai?.payload?.controller ||
              ai?.controller ||
              ai?.action?.controller ||
              "Keypad";
            const set = function () {
              document.body.dataset.controller = String(controller).toLowerCase();
            };
            if (document.body) set();
            else document.addEventListener("DOMContentLoaded", set);
          } catch {
            // Default to keypad rendering on any parse error.
          }
          return original
            ? original.call(this, port, uuid, event, info, actionInfo)
            : undefined;
        };
      })();
    </script>
    <script src="./js/sdpi-components.js"></script>
    <script src="./js/setup.js"></script>
    <script src="./js/range-value.js"></script>
    <style>
      body[data-controller="encoder"] [data-controller-only="keypad"] {
        display: none;
      }
      body[data-controller="keypad"] [data-controller-only="encoder"] {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="settings" class="hidden">
      <sdpi-item label="Device">
        <sdpi-select
          setting="selectedDeviceId"
          placeholder=""
          datasource="getDevices"
          show-refresh
          label-setting="selectedLightName"
        ></sdpi-select>
      </sdpi-item>

      <div data-controller-only="keypad">
        <sdpi-item label="Saturation">
          <sdpi-range
            setting="saturationValue"
            default="100"
            min="0"
            max="100"
            step="1"
            showlabels
            data-suffix="%"
            data-number-input
          >
            <span slot="min">Grey</span>
            <span slot="max">Vivid</span>
          </sdpi-range>
        </sdpi-item>
      </div>

      <div data-controller-only="encoder">
        <sdpi-item label="Step Size">
          <sdpi-range
            setting="stepSize"
            default="5"
            min="1"
            max="25"
            step="1"
            showlabels
            data-suffix="%"
            data-number-input
          >
            <span slot="min">Fine</span>
            <span slot="max">Coarse</span>
          </sdpi-range>
        </sdpi-item>
      </div>

      <div id="groupManager"></div>
    </div>

    <div id="setup" class="hidden">
      <sdpi-item label="API Key">
        <sdpi-password
          id="apiKey"
          global
          setting="unverifiedApiKey"
          placeholder="API key from Govee"
        ></sdpi-password>
      </sdpi-item>
      <sdpi-item>
        <sdpi-button id="connect">Connect</sdpi-button>
        <div id="errorMessage" class="hidden">
          Failed to connect, please try again.
        </div>
      </sdpi-item>
      <sdpi-item label="Guide" class="guide">
        <ol>
          <li>Open the Govee app</li>
          <li>Go to settings</li>
          <li>Select "Apply for API Key"</li>
        </ol>
      </sdpi-item>
    </div>
  </body>
</html>
