<!doctype html>
<html>
  <head lang="en-gb">
    <meta charset="utf-8" />
    <title>Govee Light Management | Scene</title>
    <link rel="stylesheet" href="./css/main.css" />
    <script src="./js/sdpi-components.js"></script>
    <script src="./js/setup.js"></script>
  </head>
  <body>
    <div id="settings" class="hidden">
      <sdpi-item label="Device">
        <sdpi-select
          id="deviceSelect"
          setting="selectedDeviceId"
          placeholder=""
          datasource="getDevices"
          show-refresh
          label-setting="selectedLightName"
        ></sdpi-select>
      </sdpi-item>

      <sdpi-item label="Scene">
        <sdpi-select
          id="sceneSelect"
          setting="selectedScene"
          datasource="getScenes"
          show-refresh
          placeholder="Select a device first"
        ></sdpi-select>
      </sdpi-item>
    </div>

    <div id="setup" class="hidden">
      <sdpi-item label="API Key">
        <sdpi-password
          id="apiKey"
          global
          setting="unverifiedApiKey"
          placeholder="API key from Govee"
        ></sdpi-password>
      </sdpi-item>
      <sdpi-item>
        <sdpi-button id="connect">Connect</sdpi-button>
        <div id="errorMessage" class="hidden">
          Failed to connect, please try again.
        </div>
      </sdpi-item>
      <sdpi-item label="Guide" class="guide">
        <ol>
          <li>Open the Govee app</li>
          <li>Go to settings</li>
          <li>Select "Apply for API Key"</li>
        </ol>
      </sdpi-item>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const deviceSelect = document.getElementById("deviceSelect");
        const sceneSelect = document.getElementById("sceneSelect");
        const client =
          typeof SDPIComponents !== "undefined"
            ? SDPIComponents.streamDeckClient
            : null;

        const sendPluginMessage = (payload) => {
          if (client && typeof client.sendToPlugin === "function") {
            client.sendToPlugin(payload);
            return;
          }

          if (client && typeof client.send === "function") {
            client.send("sendToPlugin", payload);
            return;
          }
        };

        const refreshScenes = () => {
          const selectedDeviceId = deviceSelect ? deviceSelect.value || "" : "";

          if (client) {
            sendPluginMessage({
              event: "getScenes",
              selectedDeviceId,
            });
            return;
          }

          if (sceneSelect && sceneSelect.refresh) {
            sceneSelect.refresh();
          }
        };

        window.GoveePI.attachFieldStatus(sceneSelect, "getScenes", {
          emptyMsg: "This device has no dynamic scenes available.",
          errorMsg:
            "Couldn't load scenes. Check your connection and try again.",
        });

        // When device changes, refresh the scene list
        deviceSelect.addEventListener("valuechange", refreshScenes);
        deviceSelect.addEventListener("change", refreshScenes);
        deviceSelect.addEventListener("input", refreshScenes);

        if (client && client.didReceiveSettings) {
          client.didReceiveSettings.subscribe((msg) => {
            const selectedDeviceId = msg?.payload?.settings?.selectedDeviceId;
            if (selectedDeviceId) {
              refreshScenes();
            }
          });
        }
      });
    </script>
  </body>
</html>
