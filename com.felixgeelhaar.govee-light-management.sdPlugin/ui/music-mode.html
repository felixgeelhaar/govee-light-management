<!doctype html>
<html>
  <head lang="en-gb">
    <meta charset="utf-8" />
    <title>Govee Light Management | Music Mode</title>
    <link rel="stylesheet" href="./css/main.css" />
    <script src="./js/sdpi-components.js"></script>
    <script src="./js/setup.js"></script>
    <script src="./js/range-value.js"></script>
  </head>
  <body>
    <div id="settings" class="hidden">
      <sdpi-item label="Device">
        <sdpi-select
          id="deviceSelect"
          setting="selectedDeviceId"
          placeholder=""
          datasource="getDevices"
          show-refresh
          label-setting="selectedLightName"
        ></sdpi-select>
      </sdpi-item>

      <sdpi-item label="Mode">
        <sdpi-select
          id="modeSelect"
          setting="selectedMode"
          placeholder="Select a device first"
          datasource="getMusicModes"
          show-refresh
        ></sdpi-select>
      </sdpi-item>

      <sdpi-item label="Sensitivity">
        <sdpi-range
          setting="sensitivity"
          default="50"
          min="0"
          max="100"
          step="5"
          showlabels
          data-suffix="%"
          data-number-input
        >
          <span slot="min">Low</span>
          <span slot="max">High</span>
        </sdpi-range>
      </sdpi-item>
    </div>

    <div id="setup" class="hidden">
      <sdpi-item label="API Key">
        <sdpi-password
          id="apiKey"
          global
          setting="unverifiedApiKey"
          placeholder="API key from Govee"
        ></sdpi-password>
      </sdpi-item>
      <sdpi-item>
        <sdpi-button id="connect">Connect</sdpi-button>
        <div id="errorMessage" class="hidden">
          Failed to connect, please try again.
        </div>
      </sdpi-item>
      <sdpi-item label="Guide" class="guide">
        <ol>
          <li>Open the Govee app</li>
          <li>Go to settings</li>
          <li>Select "Apply for API Key"</li>
        </ol>
      </sdpi-item>
    </div>

    <script>
      function setupDependentRefresh() {
        if (window.__goveeMusicModeDependentRefreshSetup) {
          return;
        }
        window.__goveeMusicModeDependentRefreshSetup = true;

        const deviceSelect = document.getElementById("deviceSelect");
        const modeSelect = document.getElementById("modeSelect");
        const client = window.SDPIComponents?.streamDeckClient;
        let currentSettings = {};
        let refreshTimer = null;
        let lastDeviceId = "";

        function getSelectedDeviceId() {
          return (
            deviceSelect?.shadowRoot?.querySelector("select")?.value ||
            deviceSelect?.value ||
            currentSettings.selectedDeviceId ||
            ""
          );
        }

        function getSelectedDeviceLabel() {
          const nativeSelect = deviceSelect?.shadowRoot?.querySelector("select");
          return nativeSelect?.selectedOptions?.[0]?.innerText?.trim() || "";
        }

        function clearModeSelection() {
          modeSelect.value = "";
          const nativeSelect = modeSelect?.shadowRoot?.querySelector("select");
          if (nativeSelect) {
            nativeSelect.value = "";
          }
        }

        function queueRefresh(delay = 120) {
          if (refreshTimer) {
            clearTimeout(refreshTimer);
          }

          refreshTimer = setTimeout(() => {
            refreshTimer = null;
            if (modeSelect?.refresh) {
              modeSelect.refresh();
            }
          }, delay);
        }

        async function persistDeviceSelection(selectedDeviceId) {
          if (!client?.setSettings) {
            return;
          }

          const nextSettings = {
            ...currentSettings,
            selectedDeviceId,
            selectedLightName: getSelectedDeviceLabel(),
            selectedMode: "",
          };

          currentSettings = nextSettings;
          clearModeSelection();
          await client.setSettings(nextSettings);
        }

        async function syncForCurrentDevice() {
          const selectedDeviceId = getSelectedDeviceId();
          if (!selectedDeviceId) {
            lastDeviceId = "";
            clearModeSelection();
            return;
          }

          if (selectedDeviceId !== lastDeviceId) {
            lastDeviceId = selectedDeviceId;
            await persistDeviceSelection(selectedDeviceId);
          }

          queueRefresh();
        }

        window.GoveePI.attachFieldStatus(modeSelect, "getMusicModes", {
          emptyMsg: "This device doesn't support music modes.",
          errorMsg:
            "Couldn't load music modes. Check your connection and try again.",
        });

        if (client?.didReceiveSettings?.subscribe) {
          client.didReceiveSettings.subscribe((msg) => {
            currentSettings = msg?.payload?.settings || {};
            const selectedDeviceId =
              typeof currentSettings.selectedDeviceId === "string"
                ? currentSettings.selectedDeviceId
                : "";

            if (!selectedDeviceId) {
              lastDeviceId = "";
              clearModeSelection();
              return;
            }

            if (selectedDeviceId !== lastDeviceId) {
              lastDeviceId = selectedDeviceId;
              clearModeSelection();
              queueRefresh();
            }
          });
        }

        ["valuechange", "change", "input"].forEach((eventName) => {
          deviceSelect.addEventListener(eventName, () => {
            void syncForCurrentDevice();
          });
        });

        void syncForCurrentDevice();
      }

      document.addEventListener("DOMContentLoaded", setupDependentRefresh);
      if (document.readyState !== "loading") setupDependentRefresh();
    </script>
  </body>
</html>
