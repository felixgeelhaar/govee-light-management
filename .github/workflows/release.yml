name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build, Pack & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build plugin
        run: npm run build

      - name: Validate plugin
        run: npx streamdeck validate com.felixgeelhaar.govee-light-management.sdPlugin

      - name: Pack plugin
        run: npx streamdeck pack com.felixgeelhaar.govee-light-management.sdPlugin --force

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          {
            echo "## What's New in v${{ steps.version.outputs.VERSION }}"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              # Include every conventional-commit type so chore-only releases
              # (e.g. dep bumps, release bumps) and docs updates still show up.
              # Previously the filter only matched feat/fix/perf/refactor,
              # leaving v2.3.1's "What's New" empty after a dep bump.
              git log ${PREV_TAG}..HEAD --pretty=format:"- %s" \
                --grep="^feat" \
                --grep="^fix" \
                --grep="^perf" \
                --grep="^refactor" \
                --grep="^chore" \
                --grep="^docs" \
                --grep="^build" \
                --grep="^ci" \
                --grep="^test" \
                --grep="^style" \
                --grep="^revert"
              echo ""
            fi
            echo ""
            echo "## Installation"
            echo ""
            echo "1. Download \`com.felixgeelhaar.govee-light-management.streamDeckPlugin\` below"
            echo "2. Double-click to install in Stream Deck"
            echo ""
            echo "## Requirements"
            echo ""
            echo "- Stream Deck software 6.9 or later"
            echo "- macOS 12+ or Windows 10+"
            echo "- Govee API key from [developer.govee.com](https://developer.govee.com)"
          } > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          body_path: release_notes.md
          files: com.felixgeelhaar.govee-light-management.streamDeckPlugin
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
